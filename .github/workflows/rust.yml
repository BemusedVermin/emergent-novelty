name: Rust CI

on:
    push:
        branches: [ "master" ]
        paths:
            - '**.rs'
            - 'Cargo.toml'
            - 'Cargo.lock'
    pull_request:
        branches: [ "master" ]
        paths:
            - '**.rs'
            - 'Cargo.toml'
            - 'Cargo.lock'

env:
    CARGO_TERM_COLOR: always

jobs:
    license-check:
        name: License Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
        - uses: actions/checkout@v6

        - name: Install cargo-deny
          uses: taiki-e/install-action@v2
          with:
            tool: cargo-deny
        
        - name: cargo deny check
          run: cargo deny check --hide-inclusion-graph
    security-check:
        name: Security Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
        - uses: actions/checkout@v6

        - name: Install cargo-audit
          uses: taiki-e/install-action@v2
          with:
            tool: cargo-audit

        - name: cargo audit check
          run: cargo audit --deny warnings
    lint:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            
            - name: Install Rust toolchain (stable)
              uses: dtolnay/rust-toolchain@stable
              with:
                components: rustfmt, clippy
            
            - name: Cache cargo registry and build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                shared-key: workspace
                cache-on-failure: true
            
            - name: Check formatting
              run: cargo fmt --all -- --check
            
            - name: Check for clippy warnings
              run: cargo clippy --all-targets --all-features -- -D warnings
    test:
        name: Test Suite
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
                rust: [stable, beta, nightly]
            fail-fast: false
        timeout-minutes: 10
        needs: [lint, license-check, security-check]
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain (stable)
              uses: dtolnay/rust-toolchain@master
              with:
                toolchain: ${{ matrix.rust }}
            
            - name: Cache cargo registry and build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                key: ${{ matrix.os }}-${{ matrix.rust }}
                cache-on-failure: true
            
            - name: Build
              run: cargo build --verbose
            
            - name: Run tests
              run: cargo test --all-features --all --verbose
    msrv:
        runs-on: ubuntu-latest
        needs: [lint, license-check, security-check]
        steps:
            - uses: actions/checkout@v6

            - name: Install cargo-hack
              uses: taiki-e/install-action@v2
              with:
                tool: cargo-hack
            - run: cargo hack check --rust-version --workspace --all-targets
    flux-verify:
        # Refinement-type verification via Flux (https://flux-rs.github.io).
        #
        # Flux is not yet on crates.io, so this job builds the verifier
        # from source and caches it. Two things this job catches that
        # the regular test matrix can't:
        #   1. The `flux` cargo feature actually compiles at the Rust
        #      version Flux pins (nightly-2025-11-25 at the time of
        #      writing). Drift between Flux's nightly and ours would
        #      otherwise go unnoticed until someone tried to verify.
        #   2. Every `#[cfg_attr(feature = "flux", flux_rs::sig(...))]`
        #      annotation in the crate is actually checked by Flux —
        #      a malformed sig that builds (because the proc-macro is
        #      a no-op without the verifier) would slip through.
        #
        # Linux-only because Z3 + Flux's source build is most reliable
        # there. The Windows CI matrix exercises the `flux` feature in
        # its no-op proc-macro form via `--all-features`, so a stable
        # Windows build that uses `--features flux` is already covered.
        name: Flux refinement-type verification
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [lint, license-check, security-check]
        env:
            # Bumping this updates the dep `rev` in `sim-core/Cargo.toml`
            # and the cache key in lockstep. Keep them in sync.
            FLUX_REV: 0dcdeaa512e7661b7079cdfe3b8885c4d6696f67
            FLUX_TOOLCHAIN: nightly-2025-11-25
            # Flux dispatches to the `liquid-fixpoint` Haskell binary
            # for SMT inference; it is NOT bundled with `cargo xtask
            # install`. We download a precompiled nightly binary from
            # the upstream releases. Z3 4.15.3 matches Flux's own CI
            # pin — apt's z3 is older and has been observed to hang.
            FIXPOINT_VERSION: nightly
            Z3_VERSION: 4.15.3
        steps:
            - uses: actions/checkout@v6

            - name: Install Z3 ${{ env.Z3_VERSION }}
              uses: cda-tum/setup-z3@v1.6.6
              with:
                  version: ${{ env.Z3_VERSION }}

            - name: Install liquid-fixpoint
              # Mirrors flux-rs/flux/.github/actions/install-fixpoint
              # (inlined rather than invoked by `uses: flux-rs/flux/...`
              # so the version is pinned by us, not by upstream master).
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  NAME="fixpoint-x86_64-linux-gnu.tar.gz"
                  URL="https://github.com/ucsd-progsys/liquid-fixpoint/releases/download/${FIXPOINT_VERSION}/${NAME}"
                  echo "Downloading $URL"
                  curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" --retry 3 -o "$NAME" "$URL"
                  tar -xzf "$NAME"
                  mkdir -p "$HOME/.local/bin"
                  cp fixpoint "$HOME/.local/bin/fixpoint"
                  rm -f "$NAME"
                  echo "$HOME/.local/bin" >> "$GITHUB_PATH"
                  "$HOME/.local/bin/fixpoint" --version || true

            - name: Install Flux's pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.FLUX_TOOLCHAIN }}
                  components: rust-src, rustc-dev, llvm-tools, rustfmt, clippy

            - name: Cache Flux installation
              id: flux-cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/flux
                      ~/.cargo/bin/cargo-flux
                      ~/.flux
                  key: flux-${{ runner.os }}-${{ env.FLUX_REV }}-${{ env.FLUX_TOOLCHAIN }}

            - name: Build & install Flux from source (cache miss only)
              if: steps.flux-cache.outputs.cache-hit != 'true'
              run: |
                  set -euo pipefail
                  git clone https://github.com/flux-rs/flux.git /tmp/flux-src
                  cd /tmp/flux-src
                  git checkout "${FLUX_REV}"
                  cargo xtask install

            - name: Cache cargo registry and build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: flux-verify
                  cache-on-failure: true

            - name: Verify sim-core with cargo flux
              working-directory: sim-core
              run: cargo flux --features flux

            - name: Confirm sim-core builds at Flux's pinned toolchain
              # Independent check from the verification step above: even
              # if Flux fails to find a refinement bug, we still want to
              # know that our code compiles at the toolchain version
              # Flux requires.
              run: cargo build --workspace --features flux
    creusot-verify:
        # Deductive verification via Creusot
        # (https://creusot-rs.github.io/creusot/). Runs on a separate
        # nightly toolchain pin from `flux-verify` because the two
        # verifiers track upstream rustc on different cadences.
        #
        # **LGPL handling.** `creusot-std` and `creusot-std-proc` are
        # LGPL-2.1-or-later and are intentionally never linked into
        # the release artifact (the `release` job below builds with
        # default features, which leaves the `creusot` feature OFF).
        # This job builds with `--features creusot` only to verify;
        # the resulting binary is discarded and never published.
        # `deny.toml` carries narrow per-crate exceptions for
        # `creusot-std` and `creusot-std-proc`; do NOT generalise
        # those.
        name: Creusot deductive verification
        runs-on: ubuntu-latest
        timeout-minutes: 60
        needs: [lint, license-check, security-check]
        env:
            # Pinned to Creusot v0.11.0 (matches `creusot-std = "0.11.0"`
            # in `sim-core/Cargo.toml`). cargo-creusot enforces a
            # version match between the installed driver and
            # creusot-std, so these two pins MUST move together.
            CREUSOT_TAG: v0.11.0
            CREUSOT_TOOLCHAIN: nightly-2026-02-27
        steps:
            - uses: actions/checkout@v6

            - name: Install opam (OCaml package manager)
              # Creusot's INSTALL script uses opam to install Why3,
              # Why3find, Alt-Ergo, CVC4/CVC5, and Z3 in a private
              # switch under ~/.local/share/creusot. Without opam
              # available, the script aborts before it can do anything.
              run: |
                  sudo apt-get update
                  sudo apt-get install -y opam pkg-config libgmp-dev
                  # `--bare` skips creating a default switch — Creusot
                  # creates its own switch with pinned versions.
                  opam init --bare --yes --no-setup --disable-sandboxing

            - name: Install Creusot's pinned Rust toolchain
              uses: dtolnay/rust-toolchain@master
              with:
                  toolchain: ${{ env.CREUSOT_TOOLCHAIN }}
                  components: rust-src, rustc-dev, llvm-tools, rustfmt, clippy

            - name: Cache Creusot installation
              id: creusot-cache
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/bin/cargo-creusot
                      ~/.local/share/creusot
                  key: creusot-${{ runner.os }}-${{ env.CREUSOT_TAG }}-${{ env.CREUSOT_TOOLCHAIN }}

            - name: Install Creusot from source (cache miss only)
              if: steps.creusot-cache.outputs.cache-hit != 'true'
              run: |
                  set -euo pipefail
                  git clone https://github.com/creusot-rs/creusot.git /tmp/creusot-src
                  cd /tmp/creusot-src
                  git checkout "${CREUSOT_TAG}"
                  # Creusot's INSTALL script handles the opam-side
                  # provers + Why3, then installs `cargo-creusot` and
                  # `creusot-rustc` into ~/.cargo/bin and ~/.local/share/creusot.
                  ./INSTALL

            - name: Cache cargo registry and build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  shared-key: creusot-verify
                  cache-on-failure: true

            - name: Verify sim-core with cargo creusot
              working-directory: sim-core
              # cargo-creusot accepts cargo flags after a `--`
              # separator (its `cargo_flags: Vec<String>` is `last =
              # true` in clap). Direct `--features` would be passed to
              # creusot-rustc and rejected as an unknown driver arg.
              run: cargo creusot -- --features creusot

            - name: Confirm sim-core builds at Creusot's pinned toolchain
              # Same intent as the analogous step in `flux-verify`:
              # detect drift between Creusot's toolchain pin and our
              # code separate from any verification finding.
              run: cargo build --workspace --features creusot
    code-analysis:
        name: Code Analysis (rust-code-analysis)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        needs: [lint, license-check, security-check]
        env:
            RCA_VERSION: v0.0.25
        steps:
            - uses: actions/checkout@v6

            - name: Install rust-code-analysis-cli
              run: |
                set -euo pipefail
                curl -fsSL "https://github.com/mozilla/rust-code-analysis/releases/download/${RCA_VERSION}/rust-code-analysis-linux-cli-x86_64.tar.gz" \
                  -o rca.tar.gz
                mkdir -p "$HOME/.local/bin"
                tar -xzf rca.tar.gz -C "$HOME/.local/bin"
                rm rca.tar.gz
                echo "$HOME/.local/bin" >> "$GITHUB_PATH"

            - name: Run rust-code-analysis
              run: |
                set -euo pipefail
                mkdir -p metrics-output
                rust-code-analysis-cli \
                  --metrics \
                  --output-format json \
                  --pr \
                  -X 'target/**' \
                  -p sim-core -p sim-main \
                  -o metrics-output

            - name: Upload metrics report
              uses: actions/upload-artifact@v7
              with:
                name: rust-code-analysis-metrics
                path: metrics-output
    release:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        needs: test
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Install Rust toolchain (stable)
              uses: dtolnay/rust-toolchain@stable
            
            - name: Cache cargo registry and build artifacts
              uses: Swatinem/rust-cache@v2
              with:
                shared-key: workspace
                cache-on-failure: true
            
            - name: Build release artifacts
              run: cargo build --release --verbose
            
            - name: Create release archive
              run: tar -czvf release.tar.gz target/release/
            
            - name: Upload release artifact
              uses: actions/upload-artifact@v7
              with:
                name: release-artifact
                path: release.tar.gz